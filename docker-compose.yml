services:
  # ─── Qdrant (Vector Database) ───
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  # ─── FastAPI App ───
  app:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    command: uvicorn main:app --host 0.0.0.0 --port 8000
    # No exponemos el puerto 8000 al exterior, Caddy se encargará
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
      - upload_data:/app/uploads
      - ./datasets:/app/datasets:ro
      - ./frontend:/app/frontend:ro
    depends_on:
      - qdrant
    restart: on-failure

  # ─── Caddy (Reverse Proxy & Automatic HTTPS) ───
  caddy:
    image: caddy:latest
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app

volumes:
  qdrant_data:
  upload_data:
  caddy_data:
  caddy_config:
