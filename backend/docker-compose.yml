services:
  # ─── Redis (Broker + Backend para Celery) ───
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ─── Qdrant (Vector Database) ───
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  # ─── FastAPI App ───
  app:
    build: .
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - upload_data:/app/uploads
      - ../datasets:/app/datasets:ro
      - ../frontend:/app/frontend:ro
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
    restart: on-failure

  # ─── Celery Worker ───
  worker:
    build: .
    command: celery -A workers.celery_app worker --loglevel=info --concurrency=2
    volumes:
      - .:/app
      - upload_data:/app/uploads
      - ../datasets:/app/datasets:ro
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
    restart: on-failure

volumes:
  redis_data:
  qdrant_data:
  upload_data:
