<ion-content class="search-shell-content">

  <!-- File Manager floating button -->
  <app-file-manager-menu
    [rootDirName]="(rootDirName$ | async)"
    (pickDirectory)="onPickDirectory()"
  ></app-file-manager-menu>

  <!-- Root directory picker overlay -->
  <app-root-directory-picker
    *ngIf="showDirectoryPicker"
  ></app-root-directory-picker>

  <div class="shell-layout" [class.shell-layout--results]="hasSearched">

    <!-- Search Section -->
    <section class="search-section">

      <div class="app-title" *ngIf="!hasSearched">
        <span class="title-main">meiga</span>
        <span class="title-accent">search</span>
      </div>

      <div class="search-bar-row">
        <app-search-bar
          [query]="query"
          [isLoading]="(isLoading$ | async) === true"
          (queryChange)="onQueryChange($event)"
          (searchSubmit)="onSearchSubmit($event)"
        ></app-search-bar>
      </div>

      <!-- Search mode toggle below the search bar -->
      <div class="mode-toggle-row">
        <app-search-mode-toggle
          [activeMode]="activeMode"
          (modeChange)="onModeChange($event)"
        ></app-search-mode-toggle>
      </div>

      <div class="chips-wrapper">
        <app-filter-chips
          [chips]="chips"
          [activeFilters]="activeFilters"
          (filterToggle)="onFilterToggle($event)"
        ></app-filter-chips>
      </div>

      <!-- Recent searches (only in pre-search state) -->
      <ng-container *ngIf="!hasSearched">
        <app-recent-searches
          *ngIf="(history$ | async)?.length"
          [history]="(history$ | async) ?? []"
          (selectSearch)="onSelectFromHistory($event)"
          (removeSearch)="onRemoveFromHistory($event)"
          (clearAll)="onClearHistory()"
        ></app-recent-searches>
      </ng-container>

    </section>

    <!-- Results Section -->
    <section class="results-section" *ngIf="hasSearched">

      <!-- Loading spinner -->
      <div class="loading-state" *ngIf="isLoading$ | async">
        <ion-spinner name="dots"></ion-spinner>
      </div>

      <!-- Error banner -->
      <div class="error-state" *ngIf="error$ | async as errorMsg">
        <ion-icon name="warning-outline"></ion-icon>
        <p>{{ errorMsg }}</p>
      </div>

      <!-- Results list -->
      <ng-container *ngIf="!(isLoading$ | async) && !(error$ | async)">
        <p class="results-count" *ngIf="totalResults > 0">
          {{ totalResults }} resultado{{ totalResults !== 1 ? 's' : '' }} encontrado{{ totalResults !== 1 ? 's' : '' }}
        </p>

        <div class="results-empty" *ngIf="totalResults === 0">
          <ion-icon name="search-outline"></ion-icon>
          <p>No se encontraron documentos para <strong>"{{ query }}"</strong></p>
        </div>

        <div class="results-list">
          <app-result-card
            *ngFor="let result of results"
            [result]="result"
            (cardClick)="onCardClick($event)"
          ></app-result-card>
        </div>
      </ng-container>

    </section>

  </div>
</ion-content>
