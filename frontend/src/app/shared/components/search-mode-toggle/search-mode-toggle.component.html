<div class="mode-toggle" role="group" aria-label="Search mode">
  <button
    class="mode-btn"
    [class.active]="activeMode === 'direct'"
    (click)="setMode('direct')"
    type="button"
    aria-label="Búsqueda directa"
  >
    <ion-icon name="search-outline"></ion-icon>
    <span>Búsqueda directa</span>
  </button>

  <button
    class="mode-btn"
    [class.active]="activeMode === 'descriptive'"
    (click)="setMode('descriptive')"
    type="button"
    aria-label="Búsqueda descriptiva"
  >
    <ion-icon name="sparkles-outline"></ion-icon>
    <span>Búsqueda descriptiva</span>
  </button>
</div>
