<div class="picker-backdrop">
  <div class="picker-card">

    <div class="picker-icon-wrap">
      <ion-icon name="folder-open-outline"></ion-icon>
    </div>

    <h2 class="picker-title">Elige tu directorio raíz</h2>
    <p class="picker-desc">
      Para comenzar, selecciona la carpeta que contiene tus documentos corporativos.
      Meiga Search usará esta ubicación como directorio principal de búsqueda.
    </p>

    <button class="picker-btn" type="button" (click)="onPick()" [disabled]="picking">
      <ion-icon name="folder-outline"></ion-icon>
      <span>{{ picking ? 'Abriendo…' : 'Elegir carpeta' }}</span>
    </button>

    <p class="picker-hint" *ngIf="apiUnavailable">
      <ion-icon name="warning-outline"></ion-icon>
      Tu navegador no soporta la selección de carpetas.
      Usa Chrome o Edge para activar esta función.
    </p>

  </div>
</div>
