<div class="fm-container">

  <!-- Trigger button -->
  <button
    class="fm-trigger"
    type="button"
    (click)="toggleMenu()"
    [class.fm-trigger--open]="menuOpen"
    [attr.aria-expanded]="menuOpen"
    aria-label="Gestionar archivos"
  >
    <ion-icon name="folder-open-outline"></ion-icon>
    <span class="fm-trigger-label">Gestionar archivos</span>
    <ion-icon name="chevron-down-outline" class="chevron"></ion-icon>
  </button>

  <!-- Popover menu -->
  <div class="fm-popover" *ngIf="menuOpen" (clickOutside)="closeMenu()">

    <!-- Root directory row -->
    <div class="fm-section-label">Directorio raíz</div>
    <div class="fm-dir-row">
      <ion-icon name="folder-outline" class="fm-dir-icon"></ion-icon>
      <span class="fm-dir-name" [class.fm-dir-name--unset]="!rootDirName">
        {{ rootDirName ?? 'Sin configurar' }}
      </span>
    </div>

    <div class="fm-divider"></div>

    <!-- Actions -->
    <button class="fm-action-btn" type="button" (click)="onPickDirectory()">
      <ion-icon name="swap-horizontal-outline"></ion-icon>
      <span>Cambiar directorio raíz</span>
    </button>

    <button class="fm-action-btn fm-action-btn--disabled" type="button" disabled>
      <ion-icon name="cloud-upload-outline"></ion-icon>
      <span>Añadir archivos sueltos</span>
      <span class="fm-soon-badge">Próximamente</span>
    </button>

  </div>

</div>

<!-- click-outside overlay -->
<div class="fm-backdrop" *ngIf="menuOpen" (click)="closeMenu()"></div>
